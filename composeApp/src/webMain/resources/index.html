<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SetListSync</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
    <style>
        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            background-color: #28638A;
            z-index: 9999;
            transition: opacity 0.4s ease-out;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splash img {
            width: 120px;
            height: 120px;
            border-radius: 24px;
        }
        #splash span {
            color: #ffffff;
            font-family: sans-serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
    <script type="application/javascript" src="composeApp.js"></script>
</head>
<body>
    <div id="splash">
        <img src="icon-512.png" alt="SetListSync"/>
        <span>SetListSync</span>
    </div>
    <script>
        // Hide the splash once the Compose app adds its root element to body
        const observer = new MutationObserver(function() {
            const splash = document.getElementById('splash');
            if (splash && document.body.children.length > 1) {
                splash.classList.add('hidden');
                setTimeout(function() { splash.remove(); }, 450);
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true });
    </script>
</body>
</html>
